name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '24.x']
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  pr-size-check:
    name: PR size (<= 600 LOC)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Enforce PR size limit
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${{ github.base_ref }}"
          base="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          changed="$(git diff --numstat "$base" HEAD -- . ':(exclude)pnpm-lock.yaml' \
            | awk '{ s += $1 + $2 } END { print s + 0 }')"
          echo "Changed lines (excluding lockfile): $changed (limit 600)"
          if [ "$changed" -gt 600 ]; then
            echo "::error::PR changes $changed lines, exceeding the 600 LOC limit. Split it into smaller PRs."
            exit 1
          fi
