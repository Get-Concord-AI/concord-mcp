name: Release

on:
  push:
    tags:
      - 'v*'

# Tokenless publishing via npm Trusted Publishing (OIDC). No NPM_TOKEN secret is
# used; npm authenticates the workflow through GitHub's OIDC provider. Requires a
# trusted publisher to be configured for the package on npmjs.com first (which in
# turn requires one manual first publish — see RELEASING.md).
#
# No `environment:` is set: the trusted-publisher config on npm must then leave
# its Environment field blank. To gate publishing behind maintainer approval,
# add `environment: <name>` here AND set the same name (exact case) on npm.
permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC token for npm trusted publishing + provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # NOTE: no registry-url here. actions/setup-node's registry-url writes an
      # .npmrc auth-token line, which makes npm use (empty) token auth and skip
      # OIDC entirely. Omitting it lets npm detect the OIDC trusted publisher.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      # Trusted publishing needs npm >= 11.5.1.
      - name: Update npm
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: |
          pnpm lint
          pnpm format:check
          pnpm typecheck
          pnpm test
          pnpm build

      # Provenance is generated automatically under OIDC; no --provenance flag,
      # no NODE_AUTH_TOKEN.
      - name: Publish
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
